name: Build PersonaDock bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: personadock-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Mark bundle pending
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=pending \
            -f context=personadock-bundle \
            -f description='Building PersonaDock distributions, Skills, and PersonaPack' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Reject legacy project remnants
        shell: bash
        run: |
          set -Eeuo pipefail
          : > legacy-audit.txt

          legacy_roots="$(find . -path './.git' -prune -o -type d \
            \( -iname '*companion_vault*' -o -iname '*companion-vault*' -o -iname '*companionvault*' -o -iname '*cvault*' \) \
            -print)"
          legacy_files="$(find . -path './.git' -prune -o -type f \
            \( -iname '*companion_vault*' -o -iname '*companion-vault*' -o -iname '*companionvault*' -o -iname '*cvault*' \) \
            -print)"

          if [[ -n "$legacy_roots" ]]; then
            while IFS= read -r root; do
              [[ -n "$root" ]] && find "$root" -type f -print
            done <<< "$legacy_roots" >> legacy-audit.txt
          fi
          if [[ -n "$legacy_files" ]]; then
            printf '%s\n' "$legacy_files" >> legacy-audit.txt
          fi

          text_matches="$(grep -RIlE \
            'CompanionVault|companion[_-]vault|companionvault|cvault' \
            --exclude=release-bundle.yml \
            --exclude=legacy-audit.txt \
            --exclude-dir=.git \
            . || true)"

          if [[ -n "$text_matches" ]]; then
            echo '[legacy text references]' >> legacy-audit.txt
            printf '%s\n' "$text_matches" >> legacy-audit.txt
          fi

          sort -u -o legacy-audit.txt legacy-audit.txt
          if [[ -s legacy-audit.txt ]]; then
            cat legacy-audit.txt
            exit 1
          fi

      - name: Upload legacy audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-audit-${{ github.sha }}
          path: legacy-audit.txt
          if-no-files-found: ignore
          retention-days: 7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Build Python distributions
        run: |
          mkdir -p dist/python
          python -m build --outdir dist/python

      - name: Verify bundled Skills
        shell: bash
        run: |
          set -Eeuo pipefail
          wheel="$(find dist/python -type f -name '*.whl' -print -quit)"
          sdist="$(find dist/python -type f -name '*.tar.gz' -print -quit)"
          test -n "$wheel"
          test -n "$sdist"
          python -m zipfile -l "$wheel" | grep -q 'persona_dock/data/persona-builder/SKILL.md'
          python -m zipfile -l "$wheel" | grep -q 'persona_dock/data/persona-builder/references/prompt-contract.md'
          python -m zipfile -l "$wheel" | grep -q 'persona_dock/data/persona-distiller/SKILL.md'
          python -m zipfile -l "$wheel" | grep -q 'persona_dock/data/persona-distiller/references/output-contract.md'
          python -m venv /tmp/personadock-wheel
          /tmp/personadock-wheel/bin/python -m pip install "$wheel"
          /tmp/personadock-wheel/bin/personadock skill install \
            --target generic \
            --scope project \
            --path /tmp/wheel-skills
          test -f /tmp/wheel-skills/persona-builder/SKILL.md
          test -f /tmp/wheel-skills/persona-builder/references/memory-contract.md
          test -f /tmp/wheel-skills/persona-distiller/SKILL.md
          test -f /tmp/wheel-skills/persona-distiller/references/memory-contract.md

      - name: Build example PersonaPack
        run: |
          personadock init /tmp/persona-demo --id persona-demo --name "Persona Demo"
          personadock pack /tmp/persona-demo --output "$GITHUB_WORKSPACE/dist/persona-demo-0.1.0.personapack"
          personadock inspect "$GITHUB_WORKSPACE/dist/persona-demo-0.1.0.personapack"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum python/*.whl python/*.tar.gz *.personapack > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: persona-dock-0.1.0
          path: |
            dist/python/*.whl
            dist/python/*.tar.gz
            dist/*.personapack
            dist/SHA256SUMS
          if-no-files-found: error
          compression-level: 9
          retention-days: 90

      - name: Mark bundle successful
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context=personadock-bundle \
            -f description='PersonaDock bundle uploaded successfully' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Mark bundle failed
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=failure \
            -f context=personadock-bundle \
            -f description='PersonaDock bundle failed' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
