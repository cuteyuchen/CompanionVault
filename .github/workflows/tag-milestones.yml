name: Tag milestones

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  tag:
    if: github.repository == 'cuteyuchen/CompanionVault'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tags and dispatch missing releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          for version in 0.1.0 0.2.0 1.0.0; do
            tag="v${version}"

            if ! git rev-parse "$tag" >/dev/null 2>&1; then
              sha=$(git log --format='%H %s' --all | awk -v msg="feat: release v${version}" '$0 ~ msg {print $1; exit}')
              if [ -z "$sha" ]; then
                echo "Unable to find milestone commit for $tag" >&2
                exit 1
              fi
              git tag "$tag" "$sha"
              git push origin "$tag"
            fi

            if ! gh release view "$tag" >/dev/null 2>&1; then
              echo "Dispatching release build for $tag"
              gh workflow run release.yml --ref main -f tag="$tag"
            else
              echo "Release $tag already exists"
            fi
          done
