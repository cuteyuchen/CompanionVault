name: Build release bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: release-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mark bundle build pending
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=pending \
            -f context=release-bundle \
            -f description='Building CompanionVault release bundle' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install .

      - name: Read package version
        id: metadata
        shell: bash
        run: |
          version="$(python -c 'import pathlib,tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate personas
        run: companion-vault validate

      - name: Build persona archives
        run: companion-vault build --packages

      - name: Build CLI wheel
        run: |
          mkdir -p dist/python
          python -m pip wheel . --no-deps --wheel-dir dist/python

      - name: Verify and checksum assets
        shell: bash
        run: |
          set -Eeuo pipefail
          first_zip="$(find dist/packages -type f -name '*.zip' -print -quit)"
          first_wheel="$(find dist/python -type f -name '*.whl' -print -quit)"
          test -n "$first_zip"
          test -n "$first_wheel"
          python -m zipfile -l "$first_zip" >/dev/null
          (
            cd dist
            sha256sum packages/*.zip python/*.whl > SHA256SUMS
          )

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: companion-vault-v${{ steps.metadata.outputs.version }}
          path: |
            dist/packages/*.zip
            dist/python/*.whl
            dist/registry.json
            dist/SHA256SUMS
          if-no-files-found: error
          compression-level: 9
          retention-days: 90

      - name: Mark bundle build successful
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=success \
            -f context=release-bundle \
            -f description='Release bundle uploaded successfully' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Mark bundle build failed
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state=failure \
            -f context=release-bundle \
            -f description='Release bundle build failed' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
