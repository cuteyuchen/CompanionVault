name: Tag and publish milestones

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/tag-milestones.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: milestone-releases
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'cuteyuchen/CompanionVault'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create tags and publish all milestone assets
        env:
          GH_TOKEN: ${{ github.token }}
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        shell: bash
        run: |
          set -Eeuo pipefail

          versions=(0.1.0 0.2.0 1.0.0)
          workspace="$PWD"
          temp_root="$(mktemp -d)"

          cleanup() {
            git worktree prune || true
            rm -rf "$temp_root"
          }
          trap cleanup EXIT

          for version in "${versions[@]}"; do
            tag="v${version}"

            if ! git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
              sha="$(git log --format='%H%x09%s' --all | awk -F '\t' -v msg="feat: release v${version}" '$2 == msg {print $1; exit}')"
              if [[ -z "$sha" ]]; then
                echo "Unable to find milestone commit for ${tag}" >&2
                exit 1
              fi
              git tag "$tag" "$sha"
              git push origin "refs/tags/${tag}"
            fi

            workdir="${temp_root}/${tag}"
            git worktree add --detach "$workdir" "$tag"

            python_bin="${workdir}/.venv/bin/python"
            python -m venv "${workdir}/.venv"
            "$python_bin" -m pip install --upgrade pip setuptools wheel
            "$python_bin" -m pip install "$workdir"

            (
              cd "$workdir"
              "${workdir}/.venv/bin/companion-vault" build
            )

            RELEASE_ROOT="$workdir" "$python_bin" - <<'PY'
          import hashlib
          import json
          import os
          import zipfile
          from pathlib import Path

          root = Path(os.environ["RELEASE_ROOT"])
          registry_path = root / "dist" / "registry.json"
          if not registry_path.is_file():
              raise SystemExit("dist/registry.json was not generated")

          registry = json.loads(registry_path.read_text(encoding="utf-8"))
          package_dir = root / "dist" / "packages"
          package_dir.mkdir(parents=True, exist_ok=True)
          fixed_date = (2020, 1, 1, 0, 0, 0)

          for persona in registry.get("personas", []):
              source = root / "dist" / persona["id"]
              if not source.is_dir():
                  raise SystemExit(f"missing compiled persona directory: {source}")
              destination = package_dir / f"{persona['id']}-{persona['version']}.zip"
              with zipfile.ZipFile(destination, "w", compression=zipfile.ZIP_DEFLATED) as archive:
                  for path in sorted(p for p in source.rglob("*") if p.is_file()):
                      info = zipfile.ZipInfo(path.relative_to(source).as_posix(), fixed_date)
                      info.compress_type = zipfile.ZIP_DEFLATED
                      info.external_attr = 0o644 << 16
                      archive.writestr(info, path.read_bytes())

          if not list(package_dir.glob("*.zip")):
              raise SystemExit("no persona archives were generated")
          PY

            mkdir -p "${workdir}/dist/python"
            "$python_bin" -m pip wheel "$workdir" --no-deps --wheel-dir "${workdir}/dist/python"

            first_zip="$(find "${workdir}/dist/packages" -type f -name '*.zip' -print -quit)"
            first_wheel="$(find "${workdir}/dist/python" -type f -name '*.whl' -print -quit)"
            test -n "$first_zip"
            test -n "$first_wheel"
            "$python_bin" -m zipfile -l "$first_zip" >/dev/null

            (
              cd "${workdir}/dist"
              sha256sum packages/*.zip python/*.whl > SHA256SUMS
            )

            if ! gh release view "$tag" >/dev/null 2>&1; then
              gh release create "$tag" --verify-tag --generate-notes --title "$tag"
            fi
            gh release upload "$tag" \
              "${workdir}"/dist/packages/*.zip \
              "${workdir}"/dist/python/*.whl \
              "${workdir}/dist/SHA256SUMS" \
              --clobber

            git worktree remove --force "$workdir"
          done
