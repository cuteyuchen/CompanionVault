name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Reject retired standalone distiller Skill
        shell: bash
        run: |
          set -Eeuo pipefail
          found=0
          for path in skills/persona-distiller src/persona_dock/data/persona-distiller; do
            if [[ -e "$path" ]]; then
              echo "Retired Skill directory still exists: $path" >&2
              find "$path" -type f -print | sort >&2
              found=1
            fi
          done
          test "$found" -eq 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pyinstaller

      - name: Test
        run: pytest

      - name: Validate installer scripts
        shell: bash
        run: |
          set -Eeuo pipefail
          sh -n install.sh
          pwsh -NoProfile -Command '[void][scriptblock]::Create((Get-Content install.ps1 -Raw))'

      - name: Exercise unified editor Skill installation
        run: |
          personadock skill install --target generic --scope project --path /tmp/editor-skills
          test -f /tmp/editor-skills/persona-builder/SKILL.md
          test -f /tmp/editor-skills/persona-builder/references/output-contract.md
          test -f /tmp/editor-skills/persona-builder/references/prompt-contract.md
          test -f /tmp/editor-skills/persona-builder/references/evidence-contract.md
          test -f /tmp/editor-skills/persona-builder/references/memory-contract.md
          test ! -e /tmp/editor-skills/persona-distiller
          grep -q "Create mode" /tmp/editor-skills/persona-builder/SKILL.md
          grep -q "Distill mode" /tmp/editor-skills/persona-builder/SKILL.md
          grep -q "Hybrid mode" /tmp/editor-skills/persona-builder/SKILL.md
          grep -q "personadock pack" /tmp/editor-skills/persona-builder/SKILL.md

      - name: Build and verify standalone executable
        run: |
          pyinstaller --clean --noconfirm --onefile --name personadock --collect-data persona_dock src/persona_dock/__main__.py
          python scripts/verify_binary.py --binary dist/personadock
          python scripts/package_binary.py \
            --binary dist/personadock \
            --output dist/personadock-linux-x86_64.tar.gz
          test -s dist/personadock-linux-x86_64.tar.gz

      - name: Exercise local PersonaPack workflow
        run: |
          personadock init /tmp/persona-demo --id persona-demo --name "Persona Demo"
          personadock validate /tmp/persona-demo
          personadock build /tmp/persona-demo
          personadock pack /tmp/persona-demo
          personadock inspect /tmp/persona-demo/dist/persona-demo-0.1.0.personapack
