name: Publish PersonaDock release

run-name: >-
  ${{ github.event_name == 'pull_request'
      && format('Package dry run for PR #{0}', github.event.pull_request.number)
      || format('Publish PersonaDock {0}', github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name) }}

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "src/**"
      - "scripts/**"
      - "tests_v2/**"
      - "pyproject.toml"
      - "install.sh"
      - "install.ps1"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish
        required: true
        type: string

jobs:
  validate:
    name: Test and prepare release
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      CHECKOUT_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || (github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Verify version
        id: version
        shell: bash
        run: |
          set -Eeuo pipefail
          package_version="$(python -c 'import pathlib,tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
          if [[ "$GITHUB_EVENT_NAME" != "pull_request" ]]; then
            git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}"
            test "${RELEASE_TAG}" = "v${package_version}"
          fi
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install and test source
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          pytest

      - name: Validate installer scripts
        shell: bash
        run: |
          set -Eeuo pipefail
          sh -n install.sh
          pwsh -NoProfile -Command '[void][scriptblock]::Create((Get-Content install.ps1 -Raw))'

      - name: Build example PersonaPack
        run: |
          mkdir -p release-common
          personadock init /tmp/persona-demo --id persona-demo --name "Persona Demo"
          personadock pack /tmp/persona-demo --output "$GITHUB_WORKSPACE/release-common/persona-demo-${{ steps.version.outputs.package_version }}.personapack"
          personadock inspect "$GITHUB_WORKSPACE/release-common/persona-demo-${{ steps.version.outputs.package_version }}.personapack"

      - name: Upload common release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-common
          path: release-common/*.personapack
          if-no-files-found: error
          retention-days: 30

  build-binary:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    needs: validate
    timeout-minutes: 35
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
            arch: x86_64
            executable: personadock
            archive: personadock-linux-x86_64.tar.gz
          - runner: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            executable: personadock
            archive: personadock-linux-arm64.tar.gz
          - runner: macos-15-intel
            platform: macos
            arch: x86_64
            executable: personadock
            archive: personadock-macos-x86_64.tar.gz
          - runner: macos-15
            platform: macos
            arch: arm64
            executable: personadock
            archive: personadock-macos-arm64.tar.gz
          - runner: windows-2025
            platform: windows
            arch: x86_64
            executable: personadock.exe
            archive: personadock-windows-x86_64.zip
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      CHECKOUT_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || (github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Show runner information
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          import platform
          print("system:", platform.system())
          print("machine:", platform.machine())
          print("python:", platform.python_version())
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install standalone build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build standalone executable
        run: |
          pyinstaller --clean --noconfirm --onefile --name personadock --collect-data persona_dock src/persona_dock/__main__.py

      - name: Verify standalone executable
        run: python scripts/verify_binary.py --binary "dist/${{ matrix.executable }}"

      - name: Package standalone executable
        run: python scripts/package_binary.py --binary "dist/${{ matrix.executable }}" --output "release/${{ matrix.archive }}"

      - name: Upload platform executable
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload PyInstaller diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            build/personadock/warn-personadock.txt
            build/personadock/xref-personadock.html
            personadock.spec
          if-no-files-found: ignore
          retention-days: 7

  assemble-dry-run:
    name: Assemble release assets
    if: github.event_name == 'pull_request'
    needs:
      - validate
      - build-binary
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Download platform executables
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release
          merge-multiple: true

      - name: Download common release assets
        uses: actions/download-artifact@v4
        with:
          name: release-common
          path: release

      - name: Assemble and verify checksums
        shell: bash
        run: |
          set -Eeuo pipefail
          cp install.sh install.ps1 LICENSE release/
          chmod +x release/install.sh
          cd release
          expected=(
            personadock-linux-x86_64.tar.gz
            personadock-linux-arm64.tar.gz
            personadock-macos-x86_64.tar.gz
            personadock-macos-arm64.tar.gz
            personadock-windows-x86_64.zip
            "persona-demo-${{ needs.validate.outputs.package_version }}.personapack"
            install.sh
            install.ps1
            LICENSE
          )
          for asset in "${expected[@]}"; do
            test -s "$asset"
          done
          sha256sum "${expected[@]}" > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Upload assembled dry-run release
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-${{ needs.validate.outputs.package_version }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: Publish GitHub Release
    if: github.event_name != 'pull_request'
    needs:
      - validate
      - build-binary
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Download platform executables
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release
          merge-multiple: true

      - name: Download common release assets
        uses: actions/download-artifact@v4
        with:
          name: release-common
          path: release

      - name: Add installer scripts and checksums
        shell: bash
        run: |
          set -Eeuo pipefail
          cp install.sh install.ps1 LICENSE release/
          chmod +x release/install.sh
          cd release
          expected=(
            personadock-linux-x86_64.tar.gz
            personadock-linux-arm64.tar.gz
            personadock-macos-x86_64.tar.gz
            personadock-macos-arm64.tar.gz
            personadock-windows-x86_64.zip
            "persona-demo-${{ needs.validate.outputs.package_version }}.personapack"
            install.sh
            install.ps1
            LICENSE
          )
          for asset in "${expected[@]}"; do
            test -s "$asset"
          done
          sha256sum "${expected[@]}" > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -Eeuo pipefail
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "PersonaDock ${RELEASE_TAG}"
          fi
          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            release/* \
            --clobber
