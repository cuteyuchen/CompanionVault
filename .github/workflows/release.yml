name: Publish PersonaDock release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish
        required: true
        type: string

jobs:
  validate:
    name: Test and prepare release
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Verify tag and project version
        id: version
        shell: bash
        run: |
          set -Eeuo pipefail
          git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}"
          package_version="$(python -c 'import pathlib,tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
          test "${RELEASE_TAG}" = "v${package_version}"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install and test source
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          pytest

      - name: Build example PersonaPack
        run: |
          mkdir -p release-common
          personadock init /tmp/persona-demo --id persona-demo --name "Persona Demo"
          personadock pack /tmp/persona-demo --output "$GITHUB_WORKSPACE/release-common/persona-demo-${{ steps.version.outputs.package_version }}.personapack"
          personadock inspect "$GITHUB_WORKSPACE/release-common/persona-demo-${{ steps.version.outputs.package_version }}.personapack"

      - name: Upload common release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-common
          path: release-common/*.personapack
          if-no-files-found: error
          retention-days: 30

  build-binary:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
            arch: x86_64
            executable: personadock
            archive: personadock-linux-x86_64.tar.gz
          - runner: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            executable: personadock
            archive: personadock-linux-arm64.tar.gz
          - runner: macos-15-intel
            platform: macos
            arch: x86_64
            executable: personadock
            archive: personadock-macos-x86_64.tar.gz
          - runner: macos-15
            platform: macos
            arch: arm64
            executable: personadock
            archive: personadock-macos-arm64.tar.gz
          - runner: windows-2025
            platform: windows
            arch: x86_64
            executable: personadock.exe
            archive: personadock-windows-x86_64.zip
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install standalone build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build standalone executable
        run: |
          pyinstaller --clean --noconfirm --onefile --name personadock --collect-data persona_dock src/persona_dock/__main__.py

      - name: Verify standalone executable
        run: python scripts/verify_binary.py --binary "dist/${{ matrix.executable }}"

      - name: Package standalone executable
        run: python scripts/package_binary.py --binary "dist/${{ matrix.executable }}" --output "release/${{ matrix.archive }}"

      - name: Upload platform executable
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 30

  github-release:
    name: Publish GitHub Release
    needs:
      - validate
      - build-binary
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Download platform executables
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release
          merge-multiple: true

      - name: Download common release assets
        uses: actions/download-artifact@v4
        with:
          name: release-common
          path: release

      - name: Add installer scripts and checksums
        shell: bash
        run: |
          set -Eeuo pipefail
          cp install.sh install.ps1 LICENSE release/
          chmod +x release/install.sh
          cd release
          sha256sum \
            personadock-linux-x86_64.tar.gz \
            personadock-linux-arm64.tar.gz \
            personadock-macos-x86_64.tar.gz \
            personadock-macos-arm64.tar.gz \
            personadock-windows-x86_64.zip \
            *.personapack \
            install.sh \
            install.ps1 \
            LICENSE \
            > SHA256SUMS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -Eeuo pipefail
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "PersonaDock ${RELEASE_TAG}"
          fi
          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            release/* \
            --clobber
